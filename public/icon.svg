<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Brand blue background -->
  <rect width="512" height="512" rx="0" fill="#185FA5"/>
  <!-- Safe zone: 10% padding = 51.2px each side, content area = 409.6x409.6 -->
  <!-- Finance growth chart icon (upward trend line + bar chart elements) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upward trend line -->
    <polyline points="102,384 192,288 272,320 410,144"/>
    <!-- Arrow head on trend line -->
    <polyline points="336,144 410,144 410,218"/>
  </g>
  <!-- Bar chart elements -->
  <g fill="#FFFFFF" opacity="0.6">
    <rect x="102" y="340" width="44" height="60" rx="6"/>
    <rect x="178" y="300" width="44" height="100" rx="6"/>
    <rect x="254" y="320" width="44" height="80" rx="6"/>
    <rect x="330" y="260" width="44" height="140" rx="6"/>
  </g>
</svg>
