version: 2
updates:
  # JS/TS dependencies (Yarn, migrated in this same phase's Commit 1)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    groups:
      # Vite + Vitest ecosystem: vitest peer-depends on specific vite major
      # ranges, so these must always be bumped together — including majors —
      # to avoid broken pipelines.
      vite-vitest:
        patterns:
          - 'vite'
          - 'vite-*'
          - 'vitest'
          - '@vitest/*'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      # Build tooling: TypeScript, type definitions, etc.
      build-tooling:
        patterns:
          - 'typescript'
          - '@types/*'
        update-types:
          - 'minor'
          - 'patch'
      # Test tooling: jsdom and other test-only deps (not vitest, which is
      # grouped with vite above).
      test-tooling:
        patterns:
          - 'jsdom'
        update-types:
          - 'minor'
          - 'patch'
      # Runtime dependencies: chart.js, idb-keyval — anything actually shipped
      # to the browser, kept in its own group since these warrant closer
      # individual attention (visible runtime behavior) versus build-only tools.
      runtime-deps:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
    # Major bumps for build-tooling, test-tooling, and runtime-deps are
    # excluded from those groups (each omits "major" from update-types) so
    # they arrive as individual PRs. The vite-vitest group intentionally
    # includes majors since these packages must stay version-aligned.

  # GitHub Actions versions (the workflows added in Commits 2-3 of this phase)
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Berlin'
    groups:
      actions-deps:
        patterns:
          - '*'
